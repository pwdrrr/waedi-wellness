name: Scrape Wellness

on:
  schedule:
    # alle 15 Min zwischen 06:00 und 20:45 UTC.
    # deckt 07–21 CET sowie 08–22 CEST ab.
    - cron: '*/15 6-20 * * *'
  workflow_dispatch:

permissions:
  contents: write

# nie zwei Scraper-Läufe gleichzeitig (vermeidet push-Konflikte auf der CSV)
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-scraper.txt

      - name: Install deps
        run: pip install -r requirements-scraper.txt

      - name: Pull latest data
        run: git pull --rebase --autostash

      - name: Scrape
        env:
          TZ: Europe/Zurich
        run: python scraper.py

      - name: Commit & push if changed
        run: |
          git config user.name "wellness-bot"
          git config user.email "wellness-bot@users.noreply.github.com"
          git add wellness_belegung_daten.csv
          if git diff --staged --quiet; then
            echo "Nichts zu committen."
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
